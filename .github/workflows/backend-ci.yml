name: Backend CI

on:
  push:
    branches:
      - main
      - bonus-features

  pull_request:
    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4

        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission for Maven Wrapper
        run: chmod +x mvnw

      - name: Run Tests
        run: ./mvnw test