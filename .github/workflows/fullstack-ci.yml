name: Full Stack CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  backend-test:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4

        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission for Maven Wrapper
        run: chmod +x mvnw

      - name: Run Backend Tests
        run: ./mvnw test

  frontend-build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4

        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build